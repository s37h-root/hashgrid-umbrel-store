<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <g stroke="url(#accent)" stroke-width="1.5" opacity="0.3">
    <line x1="64" y1="48" x2="64" y2="208"/>
    <line x1="128" y1="48" x2="128" y2="208"/>
    <line x1="192" y1="48" x2="192" y2="208"/>
    <line x1="48" y1="80" x2="208" y2="80"/>
    <line x1="48" y1="128" x2="208" y2="128"/>
    <line x1="48" y1="176" x2="208" y2="176"/>
  </g>
  <!-- Hash symbol # -->
  <g stroke="url(#accent)" stroke-width="8" stroke-linecap="round" opacity="0.9">
    <line x1="92" y1="68" x2="82" y2="188"/>
    <line x1="174" y1="68" x2="164" y2="188"/>
    <line x1="68" y1="108" x2="188" y2="108"/>
    <line x1="62" y1="148" x2="182" y2="148"/>
  </g>
  <!-- Signal dots -->
  <circle cx="80" cy="108" r="6" fill="#34d399"/>
  <circle cx="120" cy="108" r="6" fill="#34d399"/>
  <circle cx="172" cy="148" r="6" fill="#3b82f6"/>
  <circle cx="132" cy="148" r="6" fill="#3b82f6"/>
</svg>
