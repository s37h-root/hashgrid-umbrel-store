manifestVersion: 1.1
id: s37h-root-hashgrid-bridge
category: bitcoin
name: HashGrid Bridge
version: "1.0.1"
tagline: Remote miner monitoring bridge for the HashGrid iOS app
description: >-
  HashGrid Bridge connects your local Bitcoin miners to the HashGrid iOS app
  for remote monitoring. It scans your local network for BitAxe, Canaan, and
  other cgminer-compatible miners, then securely relays their status to your
  phone over an end-to-end encrypted connection.

  Simply install the bridge, open it to see your pairing code, and enter the
  code in the HashGrid iOS app. Your miners will appear in the app instantly,
  no port forwarding or VPN required.
developer: HashGrid
website: https://hashgrid.app
repo: https://github.com/s37h-root/hashgrid-umbrel
support: https://github.com/s37h-root/hashgrid-umbrel/issues
port: 3000
dependencies: []
gallery:
  - 1.jpg
  - 2.jpg
releaseNotes: "Initial release"
submitter: s37h-root
widgets:
  - id: "status"
    type: "four-stats"
    refresh: "5s"
    endpoint: "app:3000/api/widget"
    link: ""
    example:
      type: "four-stats"
      items:
        - title: "Pairing Code"
          text: "ABC12DEF"
          subtext: ""
        - title: "Relay"
          text: "Connected"
          subtext: ""
        - title: "Miners"
          text: "3"
          subtext: "found"
        - title: "Peer"
          text: "Online"
          subtext: ""
